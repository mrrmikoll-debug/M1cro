<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M1CRO | CORE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --neon: #00ff41;
            --neon-dim: rgba(0, 255, 65, 0.15);
            --bg: #010101;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Share Tech Mono', monospace;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--neon);
            height: 100dvh; /* Динамическая высота для мобилок */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* GPU-ускоренная сетка */
        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            perspective: 1000px;
            overflow: hidden;
        }

        .bg-grid {
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                linear-gradient(var(--neon-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--neon-dim) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: rotateX(60deg);
            animation: gridScroll 12s linear infinite;
        }

        @keyframes gridScroll {
            from { transform: rotateX(60deg) translateY(0); }
            to { transform: rotateX(60deg) translateY(40px); }
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, #000 120%);
            z-index: 2;
            pointer-events: none;
        }

        /* Основная рама */
        .main-frame {
            position: relative;
            z-index: 10;
            width: 94%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--neon);
            padding: clamp(15px, 5vw, 35px);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1);
            animation: bootUp 0.6s ease-out;
        }

        @keyframes bootUp {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--neon-dim);
            padding-bottom: 8px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        h1 {
            font-size: clamp(2rem, 12vw, 4rem);
            text-align: center;
            letter-spacing: clamp(5px, 3vw, 15px);
            margin-bottom: 25px;
            text-shadow: 0 0 10px var(--neon);
            position: relative;
        }

        /* Контентный бокс */
        .terminal-box {
            border-left: 2px solid var(--neon);
            padding-left: 15px;
            margin-bottom: 25px;
            background: rgba(0, 255, 65, 0.02);
        }

        .terminal-box p {
            font-size: clamp(0.85rem, 4vw, 1rem);
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .highlight {
            background: var(--neon);
            color: #000;
            padding: 0 4px;
            font-weight: bold;
        }

        /* Сетка навыков */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .skill-item { font-size: 11px; }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(0, 255, 65, 0.1);
            margin-top: 6px;
        }

        .progress-fill {
            height: 100%;
            background: var(--neon);
            box-shadow: 0 0 8px var(--neon);
            transition: width 1s ease-in-out;
        }

        /* Кнопки */
        .action-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            color: var(--neon);
            border: 1px solid var(--neon);
            padding: 14px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover, .btn:active {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 20px var(--neon);
        }

        /* Мобильная адаптация */
        @media (max-width: 480px) {
            .action-area { grid-template-columns: 1fr; }
            .header-info { font-size: 8px; }
            .skills-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="bg-container"><div class="bg-grid"></div></div>
<div class="vignette"></div>

<div class="main-frame">
    <div class="header-info">
        <span>BAKU_AZ</span>
        <span id="status">STATUS: OK</span>
    </div>

    <h1>M1CRO</h1>

    <div class="terminal-box">
        <p>> Исследую архитектуру кода. Основной стек: <span class="highlight">Python</span> & <span class="highlight">Bash</span>.</p>
        <p>> Специализация: <span class="highlight">System Optimization</span> и аудит безопасности ПО.</p>
        <p>> Работа с железом и низкоуровневым софтом.</p>
    </div>

    <div class="skills-grid">
        <div class="skill-item">PYTHON / BASH <div class="progress-container"><div class="progress-fill" style="width: 94%;"></div></div></div>
        <div class="skill-item">SECURITY <div class="progress-container"><div class="progress-fill" style="width: 89%;"></div></div></div>
        <div class="skill-item">OPTIMIZATION <div class="progress-container"><div class="progress-fill" style="width: 96%;"></div></div></div>
        <div class="skill-item">HARDWARE <div class="progress-container"><div class="progress-fill" style="width: 91%;"></div></div></div>
    </div>

    <div class="action-area">
        <a href="https://t.me/M1croOfficial" target="_blank" class="btn">Telegram</a>
        <a href="https://www.tiktok.com/@m1crotg" target="_blank" class="btn">TikTok</a>
    </div>
</div>

<script>
    const status = document.getElementById('status');
    const logs = ["LINK: ESTABLISHED", "ENCRYPTION: AES-256", "IDENTITY: M1CRO"];
    let i = 0;

    setInterval(() => {
        status.innerText = logs[i];
        i = (i + 1) % logs.length;
    }, 4000);
</script>

</body>
</html>
